<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Townfall Tornado</title>
  </head>
  <body>
    <main id="app" aria-label="Townfall Tornado">
      <canvas id="game-canvas" aria-label="Townfall Tornado game canvas"></canvas>

      <section id="start-screen" class="start-screen" aria-label="Mode select">
        <div class="start-screen__panel">
          <div class="start-screen__header">
            <span>Townfall</span>
            <strong>Tornado</strong>
          </div>

          <div class="mode-grid" aria-label="Choose mode">
            <button id="levels-mode-button" class="mode-button" type="button">
              <span>Levels</span>
              <strong>Objective Run</strong>
            </button>
            <button id="endless-mode-button" class="mode-button" type="button">
              <span>Endless</span>
              <strong>Free Roam</strong>
            </button>
          </div>

          <div class="quality-control" aria-label="Graphics quality">
            <span>Quality</span>
            <div class="quality-options" role="group" aria-label="Graphics quality">
              <button class="quality-button" type="button" data-quality-option="auto">Auto</button>
              <button class="quality-button" type="button" data-quality-option="low">Low</button>
              <button class="quality-button" type="button" data-quality-option="medium">Medium</button>
              <button class="quality-button" type="button" data-quality-option="high">High</button>
            </div>
            <small class="quality-summary" data-quality-summary>Detecting browser renderer...</small>
            <div class="quality-manual" aria-label="Manual quality tuning">
              <label class="quality-slider" for="start-render-scale">
                <span>Render</span>
                <input id="start-render-scale" type="range" min="50" max="135" step="5" data-quality-slider="renderScale" />
                <strong data-quality-value="renderScale">100%</strong>
              </label>
              <label class="quality-slider" for="start-effects-scale">
                <span>Effects</span>
                <input id="start-effects-scale" type="range" min="25" max="100" step="5" data-quality-slider="effectsScale" />
                <strong data-quality-value="effectsScale">100%</strong>
              </label>
              <label class="quality-slider" for="start-town-scale">
                <span>Detail</span>
                <input id="start-town-scale" type="range" min="45" max="115" step="5" data-quality-slider="townDetailScale" />
                <strong data-quality-value="townDetailScale">100%</strong>
              </label>
              <label class="quality-slider" for="start-storm-fx">
                <span>Storm FX</span>
                <input id="start-storm-fx" type="range" min="0" max="100" step="5" data-quality-slider="stormFxScale" />
                <strong data-quality-value="stormFxScale">100%</strong>
              </label>
              <div class="quality-toggles">
                <label><input type="checkbox" data-quality-toggle="shadows" /> Shadows</label>
                <label><input type="checkbox" data-quality-toggle="bloom" /> Bloom</label>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="level-tracker" aria-label="Level objective">
        <div class="level-tracker__header">
          <span id="level-label">Level 1 / 5</span>
          <strong id="level-name">First Touchdown</strong>
        </div>
        <div class="level-tracker__objective">
          <span id="objective-label">Goal 0 / 1,400 + 0% / 6%</span>
          <div class="level-tracker__bar" aria-hidden="true">
            <div id="level-progress-bar" class="level-tracker__fill"></div>
          </div>
        </div>
      </section>

      <section class="hud" aria-label="Storm readout">
        <div class="hud-panel hud-panel--primary">
          <span>Storm</span>
          <strong id="category-label">CAT 1</strong>
        </div>
        <div class="hud-panel">
          <span>Mass</span>
          <strong id="mass-label">0</strong>
        </div>
        <div class="hud-panel">
          <span>Score</span>
          <strong id="score-label">0</strong>
        </div>
        <div class="hud-panel">
          <span>Town</span>
          <strong id="damage-label">0%</strong>
        </div>
        <div class="hud-panel hud-panel--timer">
          <span>Time</span>
          <strong id="time-label">3:00</strong>
        </div>
      </section>

      <section class="storm-meter" aria-label="Storm strength">
        <div class="storm-meter__bar">
          <div id="growth-bar" class="storm-meter__fill"></div>
        </div>
        <div id="storm-message" class="storm-message" role="status" aria-live="polite"></div>
      </section>

      <div id="mobile-joystick" class="mobile-joystick" hidden aria-hidden="true" aria-label="Movement joystick">
        <div class="mobile-joystick__base" aria-hidden="true">
          <div class="mobile-joystick__knob"></div>
        </div>
      </div>

      <button id="pause-button" class="pause-button" type="button" title="Pause">
        Pause
      </button>

      <section id="pause-menu" class="pause-menu" hidden aria-hidden="true" aria-label="Pause menu">
        <div class="pause-menu__panel">
          <div class="pause-menu__header">
            <span>Paused</span>
            <strong>Storm Control</strong>
          </div>

          <label class="setting-row" for="perspective-slider">
            <span>Perspective</span>
            <input id="perspective-slider" type="range" min="0" max="100" value="35" />
            <small>Low / High</small>
          </label>

          <div class="setting-row quality-control" aria-label="Graphics quality">
            <span>Quality</span>
            <div class="quality-options" role="group" aria-label="Graphics quality">
              <button class="quality-button" type="button" data-quality-option="auto">Auto</button>
              <button class="quality-button" type="button" data-quality-option="low">Low</button>
              <button class="quality-button" type="button" data-quality-option="medium">Medium</button>
              <button class="quality-button" type="button" data-quality-option="high">High</button>
            </div>
            <small class="quality-summary" data-quality-summary>Detecting browser renderer...</small>
            <div class="quality-manual" aria-label="Manual quality tuning">
              <label class="quality-slider" for="pause-render-scale">
                <span>Render</span>
                <input id="pause-render-scale" type="range" min="50" max="135" step="5" data-quality-slider="renderScale" />
                <strong data-quality-value="renderScale">100%</strong>
              </label>
              <label class="quality-slider" for="pause-effects-scale">
                <span>Effects</span>
                <input id="pause-effects-scale" type="range" min="25" max="100" step="5" data-quality-slider="effectsScale" />
                <strong data-quality-value="effectsScale">100%</strong>
              </label>
              <label class="quality-slider" for="pause-town-scale">
                <span>Detail</span>
                <input id="pause-town-scale" type="range" min="45" max="115" step="5" data-quality-slider="townDetailScale" />
                <strong data-quality-value="townDetailScale">100%</strong>
              </label>
              <label class="quality-slider" for="pause-storm-fx">
                <span>Storm FX</span>
                <input id="pause-storm-fx" type="range" min="0" max="100" step="5" data-quality-slider="stormFxScale" />
                <strong data-quality-value="stormFxScale">100%</strong>
              </label>
              <div class="quality-toggles">
                <label><input type="checkbox" data-quality-toggle="shadows" /> Shadows</label>
                <label><input type="checkbox" data-quality-toggle="bloom" /> Bloom</label>
              </div>
            </div>
          </div>

          <div class="pause-menu__actions">
            <button id="resume-button" type="button">Resume</button>
            <button id="retry-level-button" type="button">Retry Level</button>
            <button id="restart-button" type="button">Restart Run</button>
            <button id="mode-select-button" type="button">Mode Select</button>
          </div>
        </div>
      </section>

      <div id="diagnostics" hidden aria-hidden="true"></div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
